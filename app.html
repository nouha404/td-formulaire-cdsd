<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./app.css">
    <title>Formulaire</title>
</head>
<body>
    
    <div class="container">
        
           <div class="logo-img">
                <!--html-->
           </div>
        <!--fin de video-->
        <h1>Inscription</h1>
        <!--formulaire-->

        <form >
            <label>
                Prénom et Nom
            </label>
            <br/>
            <input type="text" placeholder="Veuillez saisir votre Prénom et Nom" class="text"/>
            <br/>
            <label>
                Téléphone
            </label>
            <br/>
            <input type="search" placeholder="Veuillez saisir votre téléphone" class="tel"/>
            <br/>

            <label>
                Email
            </label>
            <br/>
            <input type="mail" placeholder="Veuillez saisir votre email" class="text"/>
            <br>
            <label>
                Mot de passe
            </label>
            <br/>
            <input type="password" placeholder="Veuillez saisir votre mot de passe" class="text"/>
            <br/>

            <label>
                Confirmer votre mot de passe
            </label>
            <br/>
            <input type="text" placeholder="Veuillez confirmer votre mot de passe" class="text"/>
            <br>

            <div class="btn">Inscription</div>
        </form>
        

        <footer>
            <a href="#">Se connecter?</a>
        </footer>
    </div>



</body>
</html>
